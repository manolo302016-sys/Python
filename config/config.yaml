paths:
  raw: "data/raw"
  processed: "data/processed"
  final: "data/final"
  output: "output"
  # Archivos fuente (R16 — 2 archivos separados)
  raw_fact: "data/raw/Resultado_mentalPRO.xlsx"
  raw_dims: "data/raw/datasets.xlsx"
  # Hojas del archivo de dimensiones (nombres reales en datasets.xlsx)
  sheet_trabajador:   "planta_personal"
  sheet_pregunta:     null               # no existe como hoja — se construye desde la batería
  sheet_respuesta:    null               # no existe como hoja — catálogo interno del script
  sheet_baremo:       null               # no existe como hoja — hardcodeado en 02b_baremos.py
  sheet_demografia:   "ficha_demografia"
  sheet_ausentismo:   "ausentismo_12meses"
  sheet_categorias:   "categorias_analisis"
  # Hoja de la tabla de hechos
  sheet_fact:         "FactRespuestas"

# Parámetros económicos (R10)
smlv_mensual: 2800000
presentismo_factor: 1.40
costo_empleador_pct: 0.60
psicosocial_pct: 0.30

# Benchmarking Colombia — Paso 17: % Alto+MuyAlto factor intralaboral por sector
# Fuente: III Encuesta Condiciones de Salud y Trabajo 2021
benchmark_sector:
  "Agricultura":            31.01
  "Manufactura":            44.83
  "Servicios":              37.20
  "Construcción":           42.21
  "Comercio/financiero":    36.40
  "Minas y canteras":       42.92
  "Administración pública": 35.98
  "Educación":              40.44
  "Salud":                  40.28
  "Transporte":             37.20   # sin dato ENCST → usa Servicios
  "No clasificado":         39.69   # promedio general como fallback
  "_promedio_general":      39.69   # referencia general Colombia

# Benchmarking Colombia — Paso 18: % Alto+MuyAlto por dominio
# Fuente: II y III Encuesta Condiciones de Salud y Trabajo 2013-2021
# Claves = nombre_nivel exacto en fact_scores_baremo (nivel_analisis='dominio' o 'factor')
benchmark_dominio:
  "Demandas del trabajo":            43.90   # IntraA/B dominio
  "Control sobre el trabajo":        16.90   # IntraA/B dominio
  "Liderazgo y relaciones sociales": 13.30   # IntraA/B dominio
  "Recompensas":                      3.30   # IntraA/B dominio
  "Extralaboral":                    26.30   # factor Extralaboral A/B
  "Estres":                          32.90   # factor Estrés A/B
  "Individual":                       4.20   # factor Individual (% nivel muy_bajo+bajo = vulnerabilidad)
  "_promedio_general":               39.69

# Benchmarking Colombia — Paso 19: % Alto+MuyAlto por dimensión
# Fuente: II y III Encuesta Condiciones de Salud y Trabajo 2013-2021
# Claves = nombre_nivel exacto en fact_scores_baremo (nivel_analisis='dimension')
# Claridad de rol tiene referencias diferentes por forma: A=20.5, B=5.8 (se maneja en script)
benchmark_dimension:
  "Demandas de carga mental":                                 58.2
  "Demandas emocionales":                                     49.4
  "Demandas cuantitativas":                                   39.2
  "Características del liderazgo":                            25.9
  "Control y autonomía sobre el trabajo":                     22.1
  "Influencia del trabajo sobre el entorno extra":            21.5   # IntraA/B
  "Influencia del entorno extralaboral sobre el trabajo":     21.5   # Extralaboral
  "Claridad de rol":                                          20.5   # forma A (B usa 5.8 en script)
  "Oportunidades de desarrollo y uso de habilidad":           18.4   # nombre real en data
  "Capacitación":                                             11.0
  "Relaciones sociales en el trabajo":                        10.1
# Nota: "Claridad de rol" forma B → 5.8% (se aplica como override en 06_benchmarking.py)
# Nota: "Supuesto acoso laboral" no existe en este dataset — no incluir

# Semáforo (R5)
semaforo_rojo_pct: 35.0   # Si empresa_pct > 35% → rojo
confidencialidad_n_min: 5  # R8 — grupos < 5 → no mostrar

# Colores AVANTUM (R11 — inamovibles)
colores_riesgo:
  sin_riesgo: "#10B981"
  bajo:       "#6EE7B7"
  medio:      "#F59E0B"
  alto:       "#F97316"
  muy_alto:   "#EF4444"

colores_proteccion:
  muy_bajo: "#EF4444"
  bajo:     "#F97316"
  medio:    "#F59E0B"
  alto:     "#6EE7B7"
  muy_alto: "#10B981"

colores_avantum:
  navy: "#0A1628"
  gold: "#C9952A"
  cyan: "#00C2CB"
